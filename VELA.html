document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

div>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n  <section style=\"max-width:1080px;margin:0 auto;padding:clamp(60px,9vw,120px) 6vw clamp(40px,5vw,70px)\">\n    <div style=\"display:grid;grid-template-columns:minmax(0,200px) minmax(0,1fr);gap:clamp(28px,5vw,72px)\">\n      <div style=\"font-weight:600;font-size:12px;letter-spacing:.2em;text-transform:uppercase;color:#b08884\">Overview<\u002Fdiv>\n      <div>\n        <p style=\"margin:0;font-family:'Schibsted Grotesk';font-weight:600;font-size:clamp(22px,3vw,32px);line-height:1.35;letter-spacing:-.015em;color:#141416\">Most fitness apps ignore the menstrual cycle entirely. VELA builds the whole experience around it.<\u002Fp>\n        <p style=\"margin:24px 0 0;font-weight:500;font-size:16px;line-height:1.7;color:#54545a\">I led brand and product design for VELA — a wellness app that personalizes training plans and daily nutrition to a user’s goals and cycle phase. The work spans the soft, confident identity and the core screens: a wellness dashboard (steps, water, sleep), a guided training plan with weekly progress, and macro-aware meal recommendations.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n  <section style=\"max-width:1180px;margin:0 auto;padding:0 6vw;display:grid;grid-template-columns:1fr 1fr;gap:clamp(16px,2.4vw,28px)\">\n    <div style=\"border-radius:16px;overflow:hidden;background:#fff;border:1px solid rgba(0,0,0,.08);box-shadow:0 26px 50px -34px rgba(20,18,22,.4)\">\n      <div style=\"position:relative;width:100%;aspect-ratio:16/10;background:#e9e6e1\"><image-slot id=\"verena-shot1\" src=\"data:image/webp;base64,UklGRuaqAABXRUJQVlA4WAoAAAAgAAAAzQMAVAIASUNDUMgBAAAAAAHIAAAAAAQwAABtbnRyUkdCIFhZWiAH4AABAAEAAAAAAABhY3NwAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAQAA9tYAAQAAAADTLQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAlkZXNjAAAA8AAAACRyWFlaAAABFAAAABRnWFlaAAABKAAAABRiWFlaAAABPAAAABR3dHB0AAABUAAAABRyVFJDAAABZAAAAChnVFJDAAABZAAAAChiVFJDAAABZAAAAChjcHJ0AA 3c42\"><span style=\"color:#c9a7a3;font-weight:700\">—<\u002Fspan> Wireframes &amp; user flows<\u002Fli>\n          <li style=\"display:flex;gap:14px;font-weight:500;font-size:16px;color:#3c3c42\"><span style=\"color:#c9a7a3;font-weight:700\">—<\u002Fspan> Visual design &amp; prototyping<\u002Fli>\n          <li style=\"display:flex;gap:14px;font-weight:500;font-size:16px;color:#3c3c42\"><span style=\"color:#c9a7a3;font-weight:700\">—<\u002Fspan> Testing &amp; iteration<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n  <a href=\"Maison%20Margiela.html\" style=\"display:block;background:#141416;color:#f4f2ef;transition:background .3s ease\" onmouseover=\"this.style.background='#1f1f24'\" onmouseout=\"this.style.background='#141416'\">\n    <div style=\"max-width:1180px;margin:0 auto;padding:clamp(50px,7vw,90px) 6vw;display:flex;justify-content:space-between;align-items:center;gap:24px;flex-wrap:wrap\">\n      <div>\n        <div style=\"font-weight:600;font-size:12px;letter-spacing:.2em;text-transform:uppercase;color:#c9a7a3;margin-bottom:14px\">Next project<\u002Fdiv>\n        <div style=\"font-family:'Schibsted Grotesk';font-weight:800;font-size:clamp(32px,5vw,64px);line-height:.98;letter-spacing:-.03em\">Maison Margiela Paris Perfume Line<\u002Fdiv>\n      <\u002Fdiv>\n      <span style=\"font-family:'Schibsted Grotesk';font-weight:800;font-size:clamp(40px,6vw,80px);color:#c9a7a3\">→<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fa>\n\n  <footer style=\"max-width:1180px;margin:0 auto;padding:clamp(40px,5vw,60px) 6vw;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:18px\">\n    <a href=\"Anibel%20Erickson.html#work\" style=\"font-weight:600;font-size:14px;color:#141416\">← Back to all work<\u002Fa>\n    <a href=\"mailto:anibel.erickson@gmail.com\" style=\"font-weight:600;font-size:14px;color:#141416;border-bottom:2px solid rgba(201,167,163,.7);padding-bottom:4px\">anibel.erickson@gmail.com<\u002Fa>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  componentDidMount() {\n    document.querySelectorAll('.pr-cover').forEach((c) => {\n      const g = c.querySelector('.pr-glass');\n      c.addEventListener('mouseenter', () => { if (g) g.style.opacity = '0'; });\n      c.addEventListener('mouseleave', () => { if (g) g.style.opacity = '1'; });\n    });\n    const ttl = document.querySelector('.pr-title');\n    if (ttl) {\n      const KEY = 'verena';\n      const read = () => { try { return JSON.parse(localStorage.getItem('ae-proj-titles') || '{}'); } catch (e) { return {}; } };\n      const stored = read()[KEY];\n      if (stored) ttl.textContent = stored;\n      const save = () => { const m = read(); if (m[KEY] === ttl.textContent.trim()) return; m[KEY] = ttl.textContent.trim(); try { localStorage.setItem('ae-proj-titles', JSON.stringify(m)); } catch (e) {} };\n      ttl.addEventListener('input', save);\n      ttl.addEventListener('blur', save);\n      try { new MutationObserver(save).observe(ttl, { characterData: true, childList: true, subtree: true }); } catch (e) {}\n    }\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"

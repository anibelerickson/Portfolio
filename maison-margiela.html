  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

26s ease-in-out infinite\"><\u002Fdiv>\n    <div style=\"position:relative;z-index:2\">\n      <div style=\"font-weight:600;font-size:12px;letter-spacing:.24em;text-transform:uppercase;color:#b08884;margin-bottom:22px\">Brand · Art Direction<\u002Fdiv>\n      <h1 class=\"pr-title\" style=\"margin:0;font-family:'Schibsted Grotesk';font-weight:800;font-size:clamp(48px,9vw,118px);line-height:.92;letter-spacing:-.035em;color:#141416\">Maison Margiela Paris Perfume Line<\u002Fh1>\n      <p style=\"margin:24px 0 0;font-weight:500;font-size:clamp(16px,2vw,21px);line-height:1.55;color:#3c3c42;max-width:620px\">A fragrance campaign concept — scent as memory, rendered as a single arresting image.<\u002Fp>\n      <div style=\"display:flex;flex-wrap:wrap;gap:clamp(28px,5vw,72px);margin-top:clamp(34px,4vw,52px)\">\n        <div><div style=\"font-weight:600;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:#9a9aa0;margin-bottom:8px\">Role<\u002Fdiv><div style=\"font-family:'Schibsted Grotesk';font-weight:700;font-size:16px;color:#141416\">Art Direction<\u002Fdiv><\u002Fdiv>\n        <div><div style=\"font-weight:600;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:#9a9aa0;margin-bottom:8px\">Timeline<\u002Fdiv><div style=\"font-family:'Schibsted Grotesk';font-weight:700;font-size:16px;color:#141416\">Concept<\u002Fdiv><\u002Fdiv>\n        <div><div style=\"font-weight:600;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:#9a9aa0;margin-bottom:8px\">Deliverables<\u002Fdiv><div style=\"font-family:'Schibsted Grotesk';font-weight:700;font-size:16px;color:#141416\">Campaign visual<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fheader>\n  <section style=\"max-width:1180px;margin:0 auto;padding:clamp(20px,3vw,40px) 6vw 0\">\n    <div class=\"pr-cover\" style=\"position:relative;width:100%;border-radius:18px;overflow:hidden;background:#fff;border:1px solid rgba(0,0,0,.08);box-shadow:0 40px 80px -44px rgba(20,18,22,.45);transition:transform .5s cubic-bezier(.4,0,.2,1)\">\n      <div style=\"position:relative;width:100%;aspect-ratio:16/10;background:#e9e6e1\">\n        <image-slot id=\"work-northrim\" shape=\"rect\" fit=\"contain\" placeholder=\"Drop your cover screenshot\" style=\"position:absolute;inset:0;width:100%;height:100%;display:block\"><\u002Fimage-slot>\n        <div class=\"pr-glass\" style=\"position:absolute;inset:0;filter:url(#pr-water);background:linear-gradient(135deg,rgba(255,255,255,.14),rgba(255,255,255,0) 45%);pointer-events:none;transition:opacity .5s ease\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n  <section style=\"max-width:1080px;margin:0 auto;padding:clamp(60px,9vw,120px) 6vw clamp(40px,5vw,70px)\">\n    <div class=\"pr-sec\" style=\"display:grid;grid-template-columns:minmax(0,200px) minmax(0,1fr);gap:clamp(28px,5vw,72px)\">\n      <div class=\"pr-label\" style=\"font-weight:600;font-size:12px;letter-spacing:.2em;text-transform:uppercase;color:#b08884\">Overview<\u002Fdiv>\n      <div>\n        <p style=\"margin:0;font-family:'Schibsted Grotesk';font-weight:600;font-size:clamp(22px,3vw,32px);line-height:1.35;letter-spacing:-.015em;color:#141416\">A spec campaign for a Replica-style scent, “New York City — Coffee &amp; Paper,” built to make a smell feel like a place.<\u002Fp>\n        <p style=\"margin:24px 0 0;font-weight:500;font-size:16px;line-height:1.7;color:#54545a\">I art-directed a fragrance advertising concept: a clean apothecary bottle suspended in a swirl of coffee over a faded newsprint cityscape, with notes — fresh coffee, milk foam, soft amber, cedarwood — that tell a morning-in-the-city story. The piece explores how composition, typography, and a single hero image can carry an entire scent narrative.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n  <section class=\"pr-pair\" style=\"max-width:1180px;margin:0 auto;padding:0 6vw;display:grid;grid-template-columns:1fr 1fr;gap:clamp(16px,2.4vw,28px)\">\n    <div style=\"border-radius:16px;overflow:hidden;background:#fff;border:1px solid rgba(0,0,0,.08);box-shadow:0 26px 50px -34px rgba(20,18,22,.4)\">\n      <div style=\"position:relative;width:100%;aspect-ratio:16/10;background:#e9e6e1\"><image-slot id=\"northrim-shot1\" shape=\"rect\" fit=\"contain\" placeholder=\"Drop a screenshot\" style=\"position:absolute;inset:0;width:100%;height:100%;display:block\"><\u002Fimage-slot><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"border-radius:16px;overflow:hidden;background:#fff;border:1px solid rgba(0,0,0,.08);box-shadow:0 26px 50px -34px rgba(20,18,22,.4)\">\n      <div style=\"position:relative;width:100%;aspect-ratio:16/10;background:#e9e6e1\"><image-slot id=\"northrim-shot2\" shape=\"rect\" fit=\"contain\" placeholder=\"Drop a screenshot\" style=\"position:absolute;inset:0;width:100%;height:100%;display:block\"><\u002Fimage-slot><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n  <section style=\"max-width:1080px;margin:0 auto;padding:clamp(60px,9vw,120px) 6vw clamp(40px,5vw,70px)\">\n    <div class=\"pr-sec\" style=\"display:grid;grid-template-columns:minmax(0,200px) minmax(0,1fr);gap:clamp(28px,5vw,72px)\">\n      <div class=\"pr-label\" style=\"font-weight:600;font-size:12px;letter-spacing:.2em;text-transform:uppercase;color:#b08884\">Process<\u002Fdiv>\n      <div>\n        <p style=\"margin:0;font-weight:500;font-size:16px;line-height:1.7;color:#54545a\">The challenge was translating an abstract scent into one frame. I anchored on a story — a quiet café before the rush — and let every element, from the coffee splash to the restrained label, reinforce it, so the image reads as a feeling before you read a word.<\u002Fp>\n        <ul style=\"margin:24px 0 0;padding:0;list-style:none;display:flex;flex-direction:column;gap:14px\">\n          <li style=\"display:flex;gap:14px;font-weight:500;font-size:16px;color:#3c3c42\"><span style=\"color:#c9a7a3;font-weight:700\">—<\u002Fspan> Research &amp; problem framing<\u002Fli>\n          <li style=\"display:flex;gap:14px;font-weight:500;font-size:16px;color:#3c3c42\"><span style=\"color:#c9a7a3;font-weight:700\">—<\u002Fspan> Wireframes &amp; user flows<\u002Fli>\n          <li style=\"display:flex;gap:14px;font-weight:500;font-size:16px;color:#3c3c42\"><span style=\"color:#c9a7a3;font-weight:700\">—<\u002Fspan> Visual design &amp; prototyping<\u002Fli>\n          <li style=\"display:flex;gap:14px;font-weight:500;font-size:16px;color:#3c3c42\"><span style=\"color:#c9a7a3;font-weight:700\">—<\u002Fspan> Testing &amp; iteration<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n  <section style=\"max-width:1180px;margin:0 auto;padding:0 6vw clamp(60px,8vw,110px)\">\n    <div style=\"border-radius:18px;overflow:hidden;background:#fff;border:1px solid rgba(0,0,0,.08);box-shadow:0 30px 60px -38px rgba(20,18,22,.45)\">\n      <div style=\"position:relative;width:100%;aspect-ratio:16/9;background:#e9e6e1\"><image-slot id=\"northrim-shot3\" shape=\"rect\" fit=\"contain\" placeholder=\"Drop a wide screenshot\" style=\"position:absolute;inset:0;width:100%;height:100%;display:block\"><\u002Fimage-slot><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n  <a href=\"ad-studio.html\" style=\"display:block;background:#141416;color:#f4f2ef;transition:background .3s ease\" onmouseover=\"this.style.background='#1f1f24'\" onmouseout=\"this.style.background='#141416'\">\n    <div style=\"max-width:1180px;margin:0 auto;padding:clamp(50px,7vw,90px) 6vw;display:flex;justify-content:space-between;align-items:center;gap:24px;flex-wrap:wrap\">\n      <div>\n        <div style=\"font-weight:600;font-size:12px;letter-spacing:.2em;text-transform:uppercase;color:#c9a7a3;margin-bottom:14px\">Next project<\u002Fdiv>\n        <div style=\"font-family:'Schibsted Grotesk';font-weight:800;font-size:clamp(32px,5vw,64px);line-height:.98;letter-spacing:-.03em\">Ad Studio<\u002Fdiv>\n      <\u002Fdiv>\n      <span style=\"font-family:'Schibsted Grotesk';font-weight:800;font-size:clamp(40px,6vw,80px);color:#c9a7a3\">→<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fa>\n\n  <footer style=\"max-width:1180px;margin:0 auto;padding:clamp(40px,5vw,60px) 6vw;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:18px\">\n    <a href=\"index.html#work\" style=\"font-weight:600;font-size:14px;color:#141416\">← Back to all work<\u002Fa>\n    <a href=\"mailto:anibel.erickson@gmail.com\" style=\"font-weight:600;font-size:14px;color:#141416;border-bottom:2px solid rgba(201,167,163,.7);padding-bottom:4px\">anibel.erickson@gmail.com<\u002Fa>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  componentDidMount() {\n    document.querySelectorAll('.pr-cover').forEach((c) => {\n      const g = c.querySelector('.pr-glass');\n      c.addEventListener('mouseenter', () => { if (g) g.style.opacity = '0'; });\n      c.addEventListener('mouseleave', () => { if (g) g.style.opacity = '1'; });\n    });\n    const ttl = document.querySelector('.pr-title');\n    if (ttl) {\n      const KEY = 'northrim';\n      const read = () => { try { return JSON.parse(localStorage.getItem('ae-proj-titles') || '{}'); } catch (e) { return {}; } };\n      const stored = read()[KEY];\n      if (stored) ttl.textContent = stored;\n      const save = () => { const m = read(); if (m[KEY] === ttl.textContent.trim()) return; m[KEY] = ttl.textContent.trim(); try { localStorage.setItem('ae-proj-titles', JSON.stringify(m)); } catch (e) {} };\n      ttl.addEventListener('input', save);\n      ttl.addEventListener('blur', save);\n      try { new MutationObserver(save).observe(ttl, { characterData: true, childList: true, subtree: true }); } catch (e) {}\n    }\n  }\n}\n<\u002Fscript>\n\n<\u002Fbody><\u002Fhtml>"

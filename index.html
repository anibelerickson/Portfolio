document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

infinite\"><\u002Fdiv>\n      <div style=\"position:relative;display:flex;flex-wrap:wrap;justify-content:space-between;align-items:center;gap:28px\">\n        <div style=\"max-width:560px\">\n          <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:16px\"><span style=\"width:9px;height:9px;border-radius:50%;background:#c9a7a3;box-shadow:0 0 0 4px rgba(201,167,163,.3)\"><\u002Fspan><span style=\"font-weight:600;font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:#9a6f6a\">Currently available<\u002Fspan><\u002Fdiv>\n          <h2 style=\"margin:0;font-family:'Schibsted Grotesk';font-weight:800;font-size:clamp(28px,4vw,46px);line-height:1.06;letter-spacing:-.025em;color:#141416\">Currently Offering Freelance Design Consultations.<\u002Fh2>\n        <\u002Fdiv>\n        <a href=\"#contact\" style=\"font-weight:600;font-size:15px;color:#fff;background:#141416;padding:17px 30px;border-radius:999px;white-space:nowrap;transition:transform .2s ease,box-shadow .2s ease\" onmouseover=\"this.style.transform='translateY(-2px)';this.style.boxShadow='0 16px 30px -14px rgba(20,18,22,.5)'\" onmouseout=\"this.style.transform='';this.style.boxShadow=''\">Let's talk →<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== CONTACT / FOOTER ===== -->\n  <footer id=\"contact\" style=\"position:relative;background:#141416;color:#f4f2ef;overflow:hidden\">\n    <div style=\"position:absolute;width:50vw;height:50vw;min-width:420px;min-height:420px;border-radius:50%;right:-14vw;top:-16vw;background:radial-gradient(circle,#c9a7a3 0%,rgba(201,167,163,0) 70%);opacity:.28;filter:blur(14px)\"><\u002Fdiv>\n    <div style=\"position:relative;max-width:1180px;margin:0 auto;padding:clamp(70px,10vw,130px) 6vw clamp(36px,5vw,56px)\">\n      <div data-reveal=\"\">\n        <div style=\"font-weight:600;font-size:12px;letter-spacing:.24em;text-transform:uppercase;color:#c9a7a3;margin-bottom:26px\">Contact<\u002Fdiv>\n        <h2 style=\"margin:0;font-family:'Schibsted Grotesk';font-weight:800;font-size:clamp(40px,8vw,104px);line-height:.94;letter-spacing:-.035em;color:#f4f2ef\">Let's work<br>together.<\u002Fh2>\n        <a href=\"mailto:anibel.erickson@gmail.com\" style=\"display:inline-block;margin-top:34px;font-family:'Schibsted Grotesk';font-weight:600;font-size:clamp(18px,2.6vw,30px);color:#f4f2ef;border-bottom:2px solid rgba(201,167,163,.7);padding-bottom:6px;transition:color .2s ease\" onmouseover=\"this.style.color='#e6c4c0'\" onmouseout=\"this.style.color='#f4f2ef'\">anibel.erickson@gmail.com<\u002Fa>\n      <\u002Fdiv>\n      <div style=\"display:flex;flex-wrap:wrap;justify-content:space-between;align-items:flex-end;gap:24px;margin-top:clamp(48px,7vw,90px);padding-top:30px;border-top:1px solid rgba(255,255,255,.14)\">\n        <div style=\"display:flex;gap:26px;flex-wrap:wrap\">\n          <a href=\"https://www.linkedin.com/in/anibel-erickson-299056337\" target=\"_blank\" rel=\"noopener\" style=\"font-weight:500;font-size:14px;color:#b9b9bf;transition:color .2s\" onmouseover=\"this.style.color='#fff'\" onmouseout=\"this.style.color='#b9b9bf'\">LinkedIn ↗<\u002Fa>\n          <a href=\"https://instagram.com/anibel_rayne\" target=\"_blank\" rel=\"noopener\" style=\"font-weight:500;font-size:14px;color:#b9b9bf;transition:color .2s\" onmouseover=\"this.style.color='#fff'\" onmouseout=\"this.style.color='#b9b9bf'\">Instagram ↗<\u002Fa>\n        <\u002Fdiv>\n        <div style=\"font-weight:500;font-size:13px;color:#76767c\">Salt Lake City, UT · © 2026 Anibel Erickson<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  componentDidMount() {\n    // Content is visible by default; the runtime handles entrance fade-in.\n    // (No manual opacity scheme — it conflicts with the runtime's own animation.)\n\n    // work tile hover: clear the glass + lift\n    document.querySelectorAll('.hp-tile').forEach((tile) => {\n      const glass = tile.querySelector('.hp-glass');\n      tile.addEventListener('mouseenter', () => {\n        if (glass) glass.style.opacity = '0';\n        tile.style.transform = 'translateY(-6px) scale(1.012)';\n      });\n      tile.addEventListener('mouseleave', () => {\n        if (glass) glass.style.opacity = '1';\n        tile.style.transform = '';\n      });\n    });\n\n    // service card lift\n    document.querySelectorAll('.hp-svc').forEach((c) => {\n      c.addEventListener('mouseenter', () => { c.style.transform = 'translateY(-6px)'; });\n      c.addEventListener('mouseleave', () => { c.style.transform = ''; });\n    });\n\n    // Project titles: the home tile is the source of truth. Whatever a tile's\n    // title says (including edits made through the editor) is mirrored to a\n    // shared store that the project pages read. A MutationObserver catches\n    // editor edits that don't fire a plain 'input' event.\n    const readTitles = () => { try { return JSON.parse(localStorage.getItem('ae-proj-titles') || '{}'); } catch (e) { return {}; } };\n    const writeTitle = (slug, val) => { const m = readTitles(); if (m[slug] === val) return; m[slug] = val; try { localStorage.setItem('ae-proj-titles', JSON.stringify(m)); } catch (e) {} };\n    document.querySelectorAll('.hp-tile').forEach((tile) => {\n      const img = tile.querySelector('image-slot[id^=\"work-\"]');\n      const ttl = tile.querySelector('.hp-ttl');\n      if (!img || !ttl) return;\n      const slug = (img.id || '').replace(/^work-/, '');\n      if (!slug) return;\n      ttl.setAttribute('contenteditable', 'true');\n      ttl.style.outline = 'none';\n      ttl.style.cursor = 'text';\n      const sync = () => writeTitle(slug, ttl.textContent.trim());\n      sync(); // seed from the current title text\n      ttl.addEventListener('input', sync);\n      ttl.addEventListener('blur', sync);\n      // catch editor-driven text changes that bypass input events\n      try { new MutationObserver(sync).observe(ttl, { characterData: true, childList: true, subtree: true }); } catch (e) {}\n    });\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
